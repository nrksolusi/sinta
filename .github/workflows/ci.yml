name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: client/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate-i18n
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test --passWithNoTests
      - name: Check API types are in sync with the OpenAPI spec
        run: |
          pnpm generate-api
          git diff --exit-code src/lib/api-types.ts

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: sinta
          POSTGRES_PASSWORD: sinta_dev
          POSTGRES_DB: sinta
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sinta"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: Check generated code is in sync (oapi-codegen + sqlc)
        run: |
          go generate .
          git diff --exit-code internal/api internal/store
