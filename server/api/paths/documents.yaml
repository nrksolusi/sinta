components:
  parameters:
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocListStatus:
      name: status
      in: query
      required: false
      schema: { type: string }
    DocListWarehouseId:
      name: warehouseId
      in: query
      required: false
      schema: { type: string, format: uuid }
    DocListDateFrom:
      name: dateFrom
      in: query
      required: false
      schema: { type: string, format: date }
    DocListDateTo:
      name: dateTo
      in: query
      required: false
      schema: { type: string, format: date }
    DocListQ:
      name: q
      in: query
      required: false
      schema: { type: string }
    DocListCursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
    DocListLimit:
      name: limit
      in: query
      required: false
      schema: { type: integer, default: 50 }

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    DocumentStatus:
      type: string
      enum: [draft, posted, reversed, cancelled]
      description: draft is editable; posted is immutable; reversed was cancelled by a reversal; cancelled is terminal for PO/SO (ADR-0018)

    FulfillmentState:
      type: string
      enum: [open, partial, closed]
      description: Server-computed per PO/SO line and document (ADR-0016); null until SN-0002 implements the rollup

    CancelInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1 }

    DocumentActor:
      type: object
      required: [id, displayName]
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string }

    DecimalString:
      type: string
      description: A decimal quantity or money value, string-encoded to avoid float loss
      example: "12.500"

    PurchaseOrderLineInput:
      type: object
      required: [productId, uom, qty]
      properties:
        productId: { type: string, format: uuid }
        uom: { type: string, minLength: 1 }
        qty: { $ref: "#/components/schemas/DecimalString" }
        unitCost: { $ref: "#/components/schemas/DecimalString" }
    PurchaseOrderLine:
      type: object
      required: [id, lineNo, productId, uom, qty, unitCost]
      properties:
        id: { type: string, format: uuid }
        lineNo: { type: integer }
        productId: { type: string, format: uuid }
        uom: { type: string }
        qty: { $ref: "#/components/schemas/DecimalString" }
        unitCost: { $ref: "#/components/schemas/DecimalString" }
        receivedQty: { $ref: "#/components/schemas/DecimalString" }
        fulfillmentState: { $ref: "#/components/schemas/FulfillmentState" }
    PurchaseOrderInput:
      type: object
      required: [supplierId, warehouseId, docDate, lines]
      properties:
        supplierId: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        docDate: { type: string, format: date }
        notes: { type: string }
        lines:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/PurchaseOrderLineInput" }
    PurchaseOrder:
      type: object
      required: [id, status, supplierId, warehouseId, docDate, notes, lines, createdAt, createdBy]
      properties:
        id: { type: string, format: uuid }
        docNumber: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/DocumentStatus" }
        supplierId: { type: string, format: uuid }
        warehouseId: { type: string, format: uuid }
        docDate: { type: string, format: date }
        notes: { type: string }
        reversesId: { type: string, format: uuid, nullable: true }
        reversedById: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        createdBy: { $ref: "#/components/schemas/DocumentActor" }
        postedAt: { type: string, format: date-time }
        postedBy: { $ref: "#/components/schemas/DocumentActor" }
        fulfillmentState: { $ref: "#/components/schemas/FulfillmentState" }
        cancelledAt: { type: string, format: date-time }
        cancelReason: { type: string }
        lines:
          type: array
          items: { $ref: "#/components/schemas/PurchaseOrderLine" }
    PurchaseOrderList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PurchaseOrder" }
        nextCursor: { type: string, nullable: true }

