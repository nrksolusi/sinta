# Documents domain (Track C - docs/plans/m1-parallel.md). A spec fragment merged
# into api/openapi.gen.yaml by cmd/bundle. Owns the order-document paths (PO,
# goods receipt, SO, delivery, transfer, adjustment, opname) and their schemas.
#
# Every document shares the draft -> posted lifecycle (PLAN.md section 3): create
# and edit while draft, post to assign the gapless number and write movements,
# then reverse to cancel by posting opposite movements (ADR-0010, glossary). Post
# and reverse take no body; a posted document is immutable so edits are rejected.
paths:
  /purchase-orders:
    get:
      operationId: listPurchaseOrders
      summary: List purchase orders
      tags: [documents]
      parameters:
        - { $ref: "#/components/parameters/DocListStatus" }
        - { $ref: "#/components/parameters/DocListWarehouseId" }
        - { $ref: "#/components/parameters/DocListDateFrom" }
        - { $ref: "#/components/parameters/DocListDateTo" }
        - { $ref: "#/components/parameters/DocListQ" }
        - { $ref: "#/components/parameters/DocListCursor" }
        - { $ref: "#/components/parameters/DocListLimit" }
      responses:
        "200":
          description: Purchase orders
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrderList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createPurchaseOrder
      summary: Create a draft purchase order
      tags: [documents]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PurchaseOrderInput" }
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /purchase-orders/{id}:
    parameters: [{ $ref: "#/components/parameters/DocumentId" }]
    get:
      operationId: getPurchaseOrder
      summary: Get a purchase order
      tags: [documents]
      responses:
        "200":
          description: Purchase order
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updatePurchaseOrder
      summary: Replace a draft purchase order (rejected once posted)
      tags: [documents]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PurchaseOrderInput" }
      responses:
        "200":
          description: Draft updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }
    delete:
      operationId: deletePurchaseOrder
      summary: Delete a draft purchase order (rejected once posted)
      tags: [documents]
      responses:
        "204":
          description: Deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /purchase-orders/{id}/post:
    parameters: [{ $ref: "#/components/parameters/DocumentId" }]
    post:
      operationId: postPurchaseOrder
      summary: Post a draft purchase order (assigns the gapless number)
      tags: [documents]
      responses:
        "200":
          description: Posted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PurchaseOrder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /purchase-orders/{id}/reverse:
    parameters: [{ $ref: "#/components/parameters/DocumentId" }]
    post:
      operationId: reversePurchaseOrder
      summary: Reverse a posted purchase order (posts a cancelling document)
      tags: [documents]
      responses:
        "201":
          description: Reversal document posted
          content:
            application/json:
