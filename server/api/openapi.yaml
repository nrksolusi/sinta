openapi: 3.0.3
info:
  title: Sinta API
  description: >
    Multi-tenant inventory management for Indonesian SME distributors.
    Contract-first: this file is the single source of truth for both the Go
    server (oapi-codegen) and the TypeScript client (openapi-typescript).
    Conventions: camelCase fields, kebab-case plural paths, /v1 prefix
    (docs/CONVENTIONS.md).
  version: 0.1.0

servers:
  - url: /v1

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /auth/register:
    post:
      operationId: register
      summary: Create a user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login:
    post:
      operationId: login
      summary: Authenticate and start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session started (session cookie set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      summary: End the current session
      responses:
        "204":
          description: Session ended
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/session:
    get:
      operationId: getSession
      summary: Current user, memberships, and active tenant
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/switch-tenant:
    post:
      operationId: switchTenant
      summary: Change the session's active tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchTenantRequest"
      responses:
        "200":
          description: Active tenant changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tenants:
    post:
      operationId: createTenant
      summary: Onboard a new tenant with its first warehouse; creator becomes owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created and activated for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tenant:
    get:
      operationId: getTenant
      summary: Profile of the session's active tenant
      responses:
        "200":
          description: Active tenant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      operationId: updateTenant
      summary: Update tenant profile (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Updated tenant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tenant/members:
    get:
      operationId: listMembers
      summary: List tenant members
      responses:
        "200":
          description: Members of the active tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tenant/members/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: updateMember
      summary: Change a member's role (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: removeMember
      summary: Remove a member (owner only)
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /tenant/invites:
    get:
      operationId: listInvites
      summary: List open invites (owner or admin)
      responses:
        "200":
          description: Open invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createInvite
      summary: Create a shareable invite link (owner or admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tenant/invites/{inviteId}:
    parameters:
      - name: inviteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      operationId: revokeInvite
      summary: Revoke an invite (owner or admin)
      responses:
        "204":
          description: Invite revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /invites/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getInvite
      summary: Public invite details for the landing page
      security: []
      responses:
        "200":
          description: Invite details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitePublic"
        "404":
          description: Unknown or revoked invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Invite expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invites/{token}/accept:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: acceptInvite
      summary: Join the inviting tenant with the invite's role
      responses:
        "200":
          description: Joined; tenant activated for this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown or revoked invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Invite expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sinta_session

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
          description: Per-field validation messages, when applicable

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 10
        name:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    SwitchTenantRequest:
      type: object
      required: [tenantId]
      properties:
        tenantId:
          type: string
          format: uuid

    User:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string

    Tenant:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    Role:
      type: string
      enum: [owner, admin, warehouse, sales, viewer]

    Membership:
      type: object
      required: [tenant, role]
      properties:
        tenant:
          $ref: "#/components/schemas/Tenant"
        role:
          $ref: "#/components/schemas/Role"

    CostingMethod:
      type: string
      enum: [weightedAverage, fifo]
      description: Locked at onboarding; switchable only at a fiscal year boundary (ADR-0002)

    CreateTenantRequest:
      type: object
      required: [name, costingMethod, warehouse]
      properties:
        name:
          type: string
          minLength: 1
        legalName:
          type: string
        costingMethod:
          $ref: "#/components/schemas/CostingMethod"
        fiscalYearStartMonth:
          type: integer
          minimum: 1
          maximum: 12
          default: 1
        warehouse:
          $ref: "#/components/schemas/WarehouseInput"

    WarehouseInput:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1

    TenantProfile:
      type: object
      required: [id, name, legalName, costingMethod, fiscalYearStartMonth, myRole]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        legalName:
          type: string
        costingMethod:
          $ref: "#/components/schemas/CostingMethod"
        fiscalYearStartMonth:
          type: integer
        myRole:
          $ref: "#/components/schemas/Role"

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        legalName:
          type: string
        fiscalYearStartMonth:
          type: integer
          minimum: 1
          maximum: 12

    Member:
      type: object
      required: [userId, name, email, role]
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"

    UpdateMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/Role"

    CreateInviteRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/Role"

    Invite:
      type: object
      required: [id, role, token, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/Role"
        token:
          type: string
        expiresAt:
          type: string
          format: date-time

    InvitePublic:
      type: object
      required: [tenantName, role]
      properties:
        tenantName:
          type: string
        role:
          $ref: "#/components/schemas/Role"

    SessionInfo:
      type: object
      required: [user, memberships]
      properties:
        user:
          $ref: "#/components/schemas/User"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        activeTenantId:
          type: string
          format: uuid
          description: Absent until a tenant is selected

security:
  - sessionCookie: []
