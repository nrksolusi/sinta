                batchId:
                    description: Absent for stock that is not batch-tracked
                    format: uuid
                    type: string
                docId:
                    format: uuid
                    type: string
                docType:
                    type: string
                effectiveAt:
                    format: date-time
                    type: string
                movementId:
                    format: uuid
                    type: string
                movementType:
                    enum:
                        - receipt
                        - issue
                        - transfer_in
                        - transfer_out
                        - adjustment
                        - opname
                        - cost_correction
                        - revaluation
                    type: string
                provisional:
                    description: True when the movement was valued below zero stock (D6)
                    type: boolean
                qty:
                    description: Signed movement quantity in base units, as a decimal string
                    type: string
                runningQty:
                    description: On-hand quantity after this movement, as a decimal string
                    type: string
                runningValue:
                    description: Total stock value after this movement, as a decimal string
                    type: string
                seq:
                    format: int64
                    type: integer
                unitCost:
                    description: Cost booked for this movement by the costing engine, as a decimal string
                    type: string
                warehouseId:
                    format: uuid
                    type: string
            required:
                - movementId
                - warehouseId
                - movementType
                - qty
                - unitCost
                - effectiveAt
                - seq
                - runningQty
                - runningValue
                - provisional
            type: object
        StockCardReport:
            properties:
                entries:
                    items:
                        $ref: '#/components/schemas/StockCardEntry'
                    type: array
                productId:
                    format: uuid
                    type: string
            required:
                - productId
                - entries
            type: object
        StockOnHandReport:
            properties:
                rows:
                    items:
                        $ref: '#/components/schemas/StockOnHandRow'
                    type: array
            required:
                - rows
            type: object
        StockOnHandRow:
            properties:
                batchId:
                    description: Absent for stock that is not batch-tracked
                    format: uuid
                    type: string
                batchNo:
                    type: string
                productId:
                    format: uuid
                    type: string
                productName:
                    type: string
                qtyOnHand:
                    description: On-hand quantity in base units, as a decimal string
                    type: string
                sku:
                    type: string
                warehouseCode:
                    type: string
                warehouseId:
                    format: uuid
                    type: string
                warehouseName:
                    type: string
            required:
                - productId
                - sku
                - productName
                - warehouseId
                - warehouseCode
                - warehouseName
                - qtyOnHand
            type: object
        StockOpname:
            properties:
                createdAt:
                    format: date-time
                    type: string
                createdBy:
                    $ref: '#/components/schemas/DocumentActor'
                docDate:
                    format: date
                    type: string
                docNumber:
                    nullable: true
                    type: string
                id:
                    format: uuid
                    type: string
                lines:
                    items:
                        $ref: '#/components/schemas/StockOpnameLine'
                    type: array
                notes:
                    type: string
                postedAt:
                    format: date-time
                    type: string
                postedBy:
                    $ref: '#/components/schemas/DocumentActor'
                reversedById:
                    format: uuid
                    nullable: true
                    type: string
                reversesId:
                    format: uuid
                    nullable: true
                    type: string
                status:
                    $ref: '#/components/schemas/DocumentStatus'
                warehouseId:
                    format: uuid
                    type: string
            required:
                - id
                - status
                - warehouseId
                - docDate
                - notes
                - lines
                - createdAt
                - createdBy
            type: object
        StockOpnameInput:
            properties:
                docDate:
                    format: date
                    type: string
                lines:
                    items:
                        $ref: '#/components/schemas/StockOpnameLineInput'
                    minItems: 1
                    type: array
                notes:
                    type: string
                warehouseId:
                    format: uuid
                    type: string
            required:
                - warehouseId
                - docDate
                - lines
            type: object
        StockOpnameLine:
            properties:
                batchId:
                    format: uuid
                    nullable: true
                    type: string
                countedQty:
                    $ref: '#/components/schemas/DecimalString'
                id:
                    format: uuid
                    type: string
                lineNo:
                    type: integer
                productId:
                    format: uuid
                    type: string
                systemQty:
                    $ref: '#/components/schemas/DecimalString'
                uom:
                    type: string
            required:
                - id
                - lineNo
                - productId
                - uom
                - countedQty
            type: object
        StockOpnameLineInput:
            properties:
                batchId:
                    format: uuid
                    nullable: true
                    type: string
                countedQty:
                    $ref: '#/components/schemas/DecimalString'
                productId:
                    format: uuid
                    type: string
                uom:
                    minLength: 1
                    type: string
            required:
                - productId
                - uom
                - countedQty
            type: object
        StockOpnameList:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/StockOpname'
                    type: array
                nextCursor:
                    nullable: true
                    type: string
            required:
                - items
                - nextCursor
            type: object
        StockTransfer:
            properties:
                createdAt:
                    format: date-time
                    type: string
                createdBy:
                    $ref: '#/components/schemas/DocumentActor'
                docDate:
                    format: date
                    type: string
                docNumber:
                    nullable: true
                    type: string
                fromWarehouseId:
                    format: uuid
                    type: string
                id:
                    format: uuid
                    type: string
                lines:
                    items:
                        $ref: '#/components/schemas/StockTransferLine'
                    type: array
                notes:
                    type: string
                postedAt:
                    format: date-time
                    type: string
                postedBy:
                    $ref: '#/components/schemas/DocumentActor'
                reversedById:
                    format: uuid
                    nullable: true
                    type: string
                reversesId:
                    format: uuid
                    nullable: true
                    type: string
                status:
                    $ref: '#/components/schemas/DocumentStatus'
                toWarehouseId:
                    format: uuid
                    type: string
            required:
                - id
                - status
                - fromWarehouseId
                - toWarehouseId
                - docDate
                - notes
                - lines
                - createdAt
                - createdBy
            type: object
        StockTransferInput:
            properties:
                docDate:
                    format: date
                    type: string
                fromWarehouseId:
                    format: uuid
                    type: string
                lines:
                    items:
                        $ref: '#/components/schemas/StockTransferLineInput'
                    minItems: 1
                    type: array
                notes:
                    type: string
                toWarehouseId:
                    format: uuid
                    type: string
            required:
                - fromWarehouseId
                - toWarehouseId
                - docDate
                - lines
            type: object
        StockTransferLine:
            properties:
                batchId:
                    format: uuid
                    nullable: true
                    type: string
                id:
                    format: uuid
                    type: string
                lineNo:
                    type: integer
                productId:
                    format: uuid
                    type: string
                qty:
                    $ref: '#/components/schemas/DecimalString'
                uom:
                    type: string
            required:
                - id
                - lineNo
                - productId
                - uom
                - qty
            type: object
        StockTransferLineInput:
            properties:
                batchId:
                    format: uuid
                    nullable: true
                    type: string
                productId:
                    format: uuid
                    type: string
                qty:
                    $ref: '#/components/schemas/DecimalString'
                uom:
                    minLength: 1
                    type: string
            required:
                - productId
                - uom
                - qty
            type: object
        StockTransferList:
            properties:
                items:
                    items:
                        $ref: '#/components/schemas/StockTransfer'
                    type: array
                nextCursor:
                    nullable: true
                    type: string
            required:
                - items
                - nextCursor
            type: object
        StockValuationReport:
            properties:
                rows:
                    items:
                        $ref: '#/components/schemas/StockValuationRow'
                    type: array
                totalValue:
                    description: Sum of value across all rows, as a decimal string
                    type: string
            required:
                - rows
                - totalValue
            type: object
        StockValuationRow:
            properties:
                avgCost:
                    description: Weighted-average unit cost, as a decimal string
                    type: string
                batchId:
                    description: Absent for stock that is not batch-tracked
                    format: uuid
                    type: string
                batchNo:
                    type: string
                productId:
                    format: uuid
                    type: string
                productName:
                    type: string
                qtyOnHand:
                    description: On-hand quantity in base units, as a decimal string
                    type: string
                sku:
                    type: string
                value:
                    description: qtyOnHand * avgCost, as a decimal string
                    type: string
                warehouseCode:
                    type: string
                warehouseId:
                    format: uuid
                    type: string
                warehouseName:
                    type: string
            required:
                - productId
                - sku
                - productName
                - warehouseId
                - warehouseCode
                - warehouseName
                - qtyOnHand
                - avgCost
                - value
            type: object
        SwitchTenantRequest:
            properties:
                tenantId:
                    format: uuid
                    type: string
            required:
                - tenantId
            type: object
        Tenant:
            properties:
                active:
                    description: Inactive tenants answer 403 tenant_inactive on every tenant-scoped request (ADR-0012)
                    type: boolean
                id:
                    format: uuid
                    type: string
                name:
                    type: string
            required:
                - id
                - name
                - active
            type: object
        TenantProfile:
            properties:
                active:
                    description: Inactive tenants answer 403 tenant_inactive on every tenant-scoped request (ADR-0012)
                    type: boolean
                costingMethod:
                    $ref: '#/components/schemas/CostingMethod'
                fiscalYearStartMonth:
                    type: integer
                id:
                    format: uuid
                    type: string
                legalName:
                    type: string
                myRole:
                    $ref: '#/components/schemas/Role'
                name:
                    type: string
            required:
                - id
                - name
                - legalName
                - costingMethod
                - fiscalYearStartMonth
                - myRole
                - active
            type: object
        UpdateMemberRequest:
            properties:
                role:
                    $ref: '#/components/schemas/Role'
            required:
                - role
            type: object
        UpdatePartnerRequest:
            description: Patch semantics; absent fields keep their current value
            properties:
                code:
                    description: Empty string clears the code
                    type: string
                isCustomer:
                    type: boolean
                isSupplier:
                    type: boolean
                name:
                    minLength: 1
                    type: string
                status:
                    $ref: '#/components/schemas/CatalogStatus'
            type: object
        UpdateProductRequest:
            description: Patch semantics; absent fields keep their current value
            properties:
                barcode:
                    description: Empty string clears the barcode
                    type: string
                baseUom:
                    minLength: 1
                    type: string
                isBatchTracked:
                    type: boolean
                name:
                    minLength: 1
                    type: string
                status:
                    $ref: '#/components/schemas/CatalogStatus'
            type: object
        UpdateTenantRequest:
            properties:
                fiscalYearStartMonth:
                    maximum: 12
                    minimum: 1
                    type: integer
                legalName:
                    type: string
                name:
                    minLength: 1
                    type: string
            type: object
        UpdateWarehouseRequest:
            description: Patch semantics; absent fields keep their current value
            properties:
                code:
                    minLength: 1
                    type: string
                name:
                    minLength: 1
                    type: string
            type: object
        User:
            properties:
                email:
                    format: email
                    type: string
                id:
                    format: uuid
                    type: string
                name:
                    type: string
            required:
                - id
                - email
                - name
            type: object
        Warehouse:
            properties:
                code:
                    type: string
                id:
                    format: uuid
                    type: string
                name:
                    type: string
            required:
                - id
                - code
                - name
            type: object
        WarehouseInput:
            properties:
                code:
                    minLength: 1
                    type: string
                name:
                    minLength: 1
                    type: string
            required:
                - code
                - name
            type: object
    securitySchemes:
        sessionCookie:
            in: cookie
            name: sinta_session
            type: apiKey
info:
    description: |
        Multi-tenant inventory management for Indonesian SME distributors. Contract-first: this file is the single source of truth for both the Go server (oapi-codegen) and the TypeScript client (openapi-typescript). Conventions: camelCase fields, kebab-case plural paths, /v1 prefix (docs/reference/CONVENTIONS.md).
    title: Sinta API
    version: 0.1.0
openapi: 3.0.3
paths:
    /auth/login:
        post:
            operationId: login
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SessionInfo'
                    description: Session started (session cookie set)
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "429":
                    $ref: '#/components/responses/TooManyRequests'
            security: []
            summary: Authenticate and start a session
    /auth/logout:
        post:
            operationId: logout
            responses:
                "204":
                    description: Session ended
                "401":
                    $ref: '#/components/responses/Unauthorized'
            summary: End the current session
    /auth/register:
        post:
            operationId: register
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RegisterRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                    description: Account created
                "409":
                    $ref: '#/components/responses/Conflict'
                "422":
                    $ref: '#/components/responses/ValidationError'
            security: []
            summary: Create a user account
    /auth/session:
        get:
            operationId: getSession
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SessionInfo'
                    description: Current session
                "401":
                    $ref: '#/components/responses/Unauthorized'
            summary: Current user, memberships, and active tenant
    /auth/switch-tenant:
        post:
            operationId: switchTenant
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SwitchTenantRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SessionInfo'
                    description: Active tenant changed
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
            summary: Change the session's active tenant
    /deliveries:
        get:
            operationId: listDeliveries
            parameters:
                - $ref: '#/components/parameters/DocListStatus'
                - $ref: '#/components/parameters/DocListWarehouseId'
                - $ref: '#/components/parameters/DocListDateFrom'
                - $ref: '#/components/parameters/DocListDateTo'
                - $ref: '#/components/parameters/DocListQ'
                - $ref: '#/components/parameters/DocListCursor'
                - $ref: '#/components/parameters/DocListLimit'
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DeliveryList'
                    description: Deliveries
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
            summary: List deliveries
            tags:
                - documents
        post:
            operationId: createDelivery
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DeliveryInput'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Delivery'
                    description: Draft created
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "422":
                    $ref: '#/components/responses/ValidationError'
            summary: Create a draft delivery
            tags:
                - documents
    /deliveries/{id}:
        delete:
            operationId: deleteDelivery
            responses:
                "204":
                    description: Deleted
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
            summary: Delete a draft delivery (rejected once posted)
            tags:
                - documents
        get:
            operationId: getDelivery
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Delivery'
                    description: Delivery
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
            summary: Get a delivery
            tags:
                - documents
        parameters:
            - $ref: '#/components/parameters/DocumentId'
        put:
            operationId: updateDelivery
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/DeliveryInput'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Delivery'
                    description: Draft updated
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
                "422":
                    $ref: '#/components/responses/ValidationError'
            summary: Replace a draft delivery (rejected once posted)
            tags:
                - documents
    /deliveries/{id}/post:
        parameters:
            - $ref: '#/components/parameters/DocumentId'
        post:
            operationId: postDelivery
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Delivery'
                    description: Posted
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
            summary: Post a draft delivery (issues stock out)
            tags:
                - documents
    /deliveries/{id}/reverse:
        parameters:
            - $ref: '#/components/parameters/DocumentId'
        post:
            operationId: reverseDelivery
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Delivery'
                    description: Reversal document posted
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
            summary: Reverse a posted delivery (posts receipt movements back in)
            tags:
                - documents
    /goods-receipts:
        get:
            operationId: listGoodsReceipts
            parameters:
                - $ref: '#/components/parameters/DocListStatus'
                - $ref: '#/components/parameters/DocListWarehouseId'
                - $ref: '#/components/parameters/DocListDateFrom'
                - $ref: '#/components/parameters/DocListDateTo'
                - $ref: '#/components/parameters/DocListQ'
                - $ref: '#/components/parameters/DocListCursor'
                - $ref: '#/components/parameters/DocListLimit'
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GoodsReceiptList'
                    description: Goods receipts
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
            summary: List goods receipts
            tags:
                - documents
        post:
            operationId: createGoodsReceipt
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GoodsReceiptInput'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GoodsReceipt'
                    description: Draft created
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "422":
                    $ref: '#/components/responses/ValidationError'
            summary: Create a draft goods receipt
            tags:
                - documents
    /goods-receipts/{id}:
        delete:
            operationId: deleteGoodsReceipt
            responses:
                "204":
                    description: Deleted
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
            summary: Delete a draft goods receipt (rejected once posted)
            tags:
                - documents
        get:
            operationId: getGoodsReceipt
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GoodsReceipt'
                    description: Goods receipt
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
            summary: Get a goods receipt
            tags:
                - documents
        parameters:
            - $ref: '#/components/parameters/DocumentId'
        put:
            operationId: updateGoodsReceipt
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/GoodsReceiptInput'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GoodsReceipt'
                    description: Draft updated
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
                "422":
                    $ref: '#/components/responses/ValidationError'
            summary: Replace a draft goods receipt (rejected once posted)
            tags:
                - documents
    /goods-receipts/{id}/post:
        parameters:
            - $ref: '#/components/parameters/DocumentId'
        post:
            operationId: postGoodsReceipt
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GoodsReceipt'
                    description: Posted
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
            summary: Post a draft goods receipt (receives stock, cost enters the journal)
            tags:
                - documents
    /goods-receipts/{id}/reverse:
        parameters:
            - $ref: '#/components/parameters/DocumentId'
        post:
            operationId: reverseGoodsReceipt
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GoodsReceipt'
                    description: Reversal document posted
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    $ref: '#/components/responses/NotFound'
                "409":
                    $ref: '#/components/responses/Conflict'
            summary: Reverse a posted goods receipt (posts issue movements back out)
            tags:
                - documents
    /health:
        get:
            operationId: getHealth
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Health'
                    description: Service is up
            security: []
            summary: Liveness check
    /invites/{token}:
        get:
            operationId: getInvite
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InvitePublic'
                    description: Invite details
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: Unknown or revoked invite
                "410":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
