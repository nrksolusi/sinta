info:
    description: |
        Multi-tenant inventory management for Indonesian SME distributors. Contract-first: this file is the single source of truth for both the Go server (oapi-codegen) and the TypeScript client (openapi-typescript). Conventions: camelCase fields, kebab-case plural paths, /v1 prefix (docs/CONVENTIONS.md).
    title: Sinta API
    version: 0.1.0
openapi: 3.0.3
paths:
    /auth/login:
        post:
            operationId: login
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LoginRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SessionInfo'
                    description: Session started (session cookie set)
                "401":
                    $ref: '#/components/responses/Unauthorized'
            security: []
            summary: Authenticate and start a session
    /auth/logout:
        post:
            operationId: logout
            responses:
                "204":
                    description: Session ended
                "401":
                    $ref: '#/components/responses/Unauthorized'
            summary: End the current session
    /auth/register:
        post:
            operationId: register
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RegisterRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/User'
                    description: Account created
                "409":
                    $ref: '#/components/responses/Conflict'
                "422":
                    $ref: '#/components/responses/ValidationError'
            security: []
            summary: Create a user account
    /auth/session:
        get:
            operationId: getSession
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SessionInfo'
                    description: Current session
                "401":
                    $ref: '#/components/responses/Unauthorized'
            summary: Current user, memberships, and active tenant
    /auth/switch-tenant:
        post:
            operationId: switchTenant
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SwitchTenantRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SessionInfo'
                    description: Active tenant changed
