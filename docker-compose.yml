services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: sinta
      POSTGRES_PASSWORD: sinta_dev # local development only; production uses env outside git
      POSTGRES_DB: sinta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinta"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
